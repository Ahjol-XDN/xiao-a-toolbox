name: Build & Release (WPF)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $csproj = [xml](Get-Content XiaoAToolbox\XiaoAToolbox.csproj)
          $version = $csproj.Project.PropertyGroup.Version
          Write-Output "APP_VERSION=$version"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore NuGet
        run: dotnet restore XiaoAToolbox\XiaoAToolbox.csproj

      - name: Build
        run: dotnet build XiaoAToolbox\XiaoAToolbox.csproj -c Release --no-restore

      - name: Publish (framework-dependent)
        run: |
          dotnet publish XiaoAToolbox\XiaoAToolbox.csproj -c Release -o publish `
            --self-contained false `
            -p:PublishSingleFile=false `
            -p:RuntimeIdentifier=win-x64 `
            --no-restore

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          7z x ffmpeg.zip -offmpeg_temp
          $ffmpegDir = Get-ChildItem ffmpeg_temp -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path publish\engines\ffmpeg\bin | Out-Null
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" publish\engines\ffmpeg\bin\
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" publish\engines\ffmpeg\bin\

      - name: Download Pandoc
        shell: pwsh
        run: |
          $url = "https://github.com/jgm/pandoc/releases/download/3.6.4/pandoc-3.6.4-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile pandoc.zip
          7z x pandoc.zip -opandoc_temp
          $pandocDir = Get-ChildItem pandoc_temp -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path publish\engines\pandoc | Out-Null
          Copy-Item "$($pandocDir.FullName)\pandoc.exe" publish\engines\pandoc\

      - name: Package Release
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipName = "XiaoAToolbox-v$version-portable.zip"
          7z a -tzip -mx9 $zipName ".\publish\*"
          Write-Output "Created: $zipName"
          $size = (Get-Item $zipName).Length / 1MB
          Write-Output "Size: $([math]::Round($size,1)) MB"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "灏廇宸ュ叿绠?v${{ steps.version.outputs.version }}"
          body: |
            ## 灏廇涓囪兘杞崲宸ュ叿绠?v${{ steps.version.outputs.version }}

            鍩轰簬 .NET 8 WPF 鍘熺敓鏋勫缓锛屽畬鍏ㄦ湰鍦拌繍琛屻€?
            ### 浣跨敤鏂瑰紡
            1. 纭繚宸插畨瑁?[.NET 8 杩愯鏃禲(https://dotnet.microsoft.com/download/dotnet/8.0)
            2. 瑙ｅ帇 zip锛屽彸閿?`install.ps1` 鈫?浣跨敤 PowerShell 杩愯
            3. 妗岄潰浼氱敓鎴愬揩鎹锋柟寮?
            ### 鍔熻兘
            - 馃幀 瑙嗛鏍煎紡杞崲 / 鍘嬬缉 / 瑁佸壀 / 杞?GIF / 鎴浘
            - 馃幍 瑙嗛鎻愬彇闊抽
            - 馃帶 闊抽杞崲 / 鍚堝苟 / 瑁佸壀
            - 馃搫 鏂囨。杞崲 (DOCX/PDF/MD/HTML 绛?
            - 馃柤锔?鍥剧墖杞崲 (PNG/JPG/WebP 绛?
            - 馃搼 PDF 鍚堝苟 / 鎷嗗垎
            - 馃摝 鎵归噺缁熶竴杞崲
            - 馃寪 涓?/ English 鍙岃
          files: XiaoAToolbox-v${{ steps.version.outputs.version }}-portable.zip
          draft: false
