appId: com.xiaoa.toolbox
productName: "小A万能转换工具箱"
copyright: "Copyright 2024"
directories:
  output: dist
  buildResources: resources
files:
  - dist-electron
  - dist
win:
  target:
    - target: portable
      arch:
        - x64
  icon: resources/icons/icon.png
  signAndEditExecutable: false
extraResources:
  - from: engines/
    to: engines/
    filter:
      - "**/*"
