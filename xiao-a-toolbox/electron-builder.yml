appId: com.xiaoa.toolbox
productName: 小A万能转换工具箱
copyright: Copyright © 2024
directories:
  output: dist
  buildResources: resources
files:
  - dist-electron
  - dist
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icons/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 小A万能转换工具箱
extraResources:
  - from: engines/
    to: engines/
    filter: ["**/*"]
